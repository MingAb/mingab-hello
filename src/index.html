<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>极客阿明 | 独立思考与灵感收集</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#ad2c00", "secondary-fixed-dim": "#ffb5a0", "secondary-fixed": "#ffdbd1",
                        "primary": "#021541", "primary-fixed": "#dae1ff",
                        "surface": "#f9f9fb", "on-surface": "#1a1c1d", "surface-variant": "#e2e2e4",
                        "on-surface-variant": "#45464f", "outline-variant": "#c5c6d0", "secondary-container": "#d83900",
                        "on-secondary": "#ffffff", "surface-container-highest": "#e2e2e4", "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "Noto Serif SC", "STSong", "serif"],
                        "body": ["Manrope", "PingFang SC", "Microsoft YaHei", "sans-serif"],
                        "label": ["Manrope", "PingFang SC", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fade-transition { transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; }
        .fade-out { opacity: 0; transform: translateY(10px); }
        html, body { overflow-x: hidden; width: 100%; min-height: 100vh; scroll-behavior: smooth; }
        
        /* 🌟 科技感菱形指示器专属样式 */
        .diamond-dot { clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0% 50%); }
    </style>
</head>

<body class="bg-surface dark:bg-slate-900 text-on-surface dark:text-gray-100 font-body transition-colors duration-500 selection:bg-secondary-fixed selection:text-secondary flex flex-col relative">

    <div class="fixed top-0 left-0 w-1/4 h-1 bg-secondary z-[60] transition-all duration-500" id="progress-bar"></div>

    <!-- ========== 顶部导航栏 ========== -->
    <nav class="fixed top-0 w-full z-50 bg-white/95 dark:bg-slate-950/95 backdrop-blur-md flex justify-between items-center px-4 md:px-8 py-3 md:py-4 shadow-sm dark:shadow-none transition-colors duration-500">
        <div class="text-xl md:text-2xl font-black text-blue-950 dark:text-white uppercase tracking-widest font-headline shrink-0">
            极客阿明
        </div>
        
        <div class="hidden md:flex items-center space-x-10">
            <a class="text-orange-700 dark:text-orange-500 font-bold border-b-2 border-orange-700 pb-1 font-serif text-lg tracking-tight" href="#">主页展览</a>
            <a class="text-slate-600 dark:text-slate-400 hover:text-blue-900 dark:hover:text-blue-300 transition-colors font-serif text-lg tracking-tight" href="#">随笔文章</a>
            <a class="text-slate-600 dark:text-slate-400 hover:text-blue-900 dark:hover:text-blue-300 transition-colors font-serif text-lg tracking-tight" href="#">作品集合</a>
            <a class="text-slate-600 dark:text-slate-400 hover:text-blue-900 dark:hover:text-blue-300 transition-colors font-serif text-lg tracking-tight" href="#">关于我</a>
        </div>
        
        <div class="flex items-center space-x-2 md:space-x-4">
            <span class="md:hidden text-orange-700 dark:text-orange-500 font-bold border-b-2 border-orange-700 pb-0.5 font-serif text-sm mr-1">主页展览</span>
            <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all duration-300 rounded-full flex items-center justify-center shrink-0">
                <span id="theme-icon" class="material-symbols-outlined text-blue-900 dark:text-yellow-400 text-base md:text-lg">dark_mode</span>
            </button>
            <button onclick="toggleMobileMenu()" class="md:hidden p-2 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all duration-300 rounded-full flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-blue-900 dark:text-white text-2xl">menu</span>
            </button>
        </div>

        <div id="mobile-menu" class="absolute top-full left-0 w-full bg-white dark:bg-slate-900 shadow-xl border-t border-gray-100 dark:border-slate-800 hidden flex-col md:hidden transition-colors">
            <a href="#" class="px-6 py-4 text-orange-700 dark:text-orange-500 font-bold border-b border-gray-100 dark:border-slate-800">主页展览</a>
            <a href="#" class="px-6 py-4 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 border-b border-gray-100 dark:border-slate-800">随笔文章</a>
            <a href="#" class="px-6 py-4 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 border-b border-gray-100 dark:border-slate-800">作品集合</a>
            <a href="#" class="px-6 py-4 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800">关于我</a>
        </div>
    </nav>

    <!-- ========== 核心视觉区 ========== -->
    <main class="flex-1 w-full flex flex-col md:flex-row items-center justify-center px-6 md:px-20 pt-20 md:pt-28 pb-12 md:pb-16 relative overflow-visible">
        
        <div class="absolute top-10 left-0 w-64 h-64 md:w-96 md:h-96 bg-secondary-fixed-dim/30 dark:bg-secondary-fixed-dim/10 rounded-full blur-3xl opacity-50 z-0 pointer-events-none"></div>
        <div class="absolute bottom-10 right-0 w-64 h-64 md:w-96 md:h-96 bg-primary-fixed/40 dark:bg-primary-fixed/10 rounded-full blur-3xl opacity-50 z-0 pointer-events-none"></div>
        
        <!-- 🌟 电脑端：霸气的侧边悬浮左箭头 (md:flex) -->
        <button onclick="changeProject(-1)" class="hidden md:flex absolute left-8 z-40 w-14 h-14 items-center justify-center rounded-full bg-white dark:bg-slate-800 text-primary dark:text-white hover:bg-secondary hover:text-white dark:hover:bg-orange-600 transition-all duration-300 shadow-xl active:scale-95">
            <span class="material-symbols-outlined text-3xl">arrow_back_ios_new</span>
        </button>

        <div class="flex flex-col md:flex-row items-center w-full max-w-7xl mx-auto gap-8 md:gap-24 relative z-10">
            
            <!-- ====== 3D 图片特效区 ====== -->
            <div class="w-full md:w-1/2 flex flex-col justify-center items-center order-1 md:order-2 relative group fade-transition mt-0" id="img-container">
                <div style="perspective: 1200px; width: 100%; display: flex; justify-content: center;">
                    <div id="scroll-image" class="relative w-full max-w-[300px] h-[400px] md:max-w-[340px] md:h-[480px] rounded-xl shadow-[0_15px_40px_rgba(0,0,0,0.3)] dark:shadow-[0_15px_40px_rgba(0,0,0,0.8)] transition-all duration-700 ease-out 
                    md:[transform:rotateY(15deg)_rotateZ(-4deg)] md:group-hover:[transform:rotateY(0deg)_rotateZ(0deg)_scale(1.05)] cursor-pointer overflow-hidden z-10">
                        
                        <div class="absolute top-4 left-4 z-10 bg-white/90 dark:bg-black/80 backdrop-blur px-4 py-2 rounded-full shadow-lg transition-colors">
                            <span class="font-label text-[10px] font-black uppercase tracking-widest text-primary dark:text-white">精选集</span>
                        </div>
                        
                        <img id="proj-img" alt="主视觉图" class="w-full h-full object-cover md:grayscale md:group-hover:grayscale-0 transition-all duration-700" src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=800&auto=format&fit=crop"/>
                        <div class="absolute inset-0 md:bg-black/10 md:group-hover:bg-transparent transition-colors duration-700 pointer-events-none"></div>
                    </div>
                </div>
                <div id="proj-num" class="absolute -bottom-10 -left-10 font-headline text-[10rem] text-surface-variant dark:text-slate-800 opacity-40 select-none hidden md:block transition-colors duration-500 z-[-1]">01</div>
            </div>

            <!-- ====== 文字介绍区 ====== -->
            <div id="text-container" class="w-full md:w-1/2 flex flex-col items-start text-left space-y-4 md:space-y-6 order-2 md:order-1 fade-transition">
                <div class="flex items-center space-x-3 mb-1">
                    <span class="h-px w-8 md:w-12 bg-secondary"></span>
                    <span id="proj-tag" class="font-label text-[10px] md:text-xs uppercase tracking-[0.3em] text-secondary dark:text-orange-400 font-bold">Vol. 001 创刊号</span>
                </div>
                <h1 id="proj-title" class="font-headline text-5xl md:text-7xl lg:text-8xl text-primary dark:text-white leading-[1.1] md:leading-[0.95] tracking-tighter transition-colors">
                    代码与 <br/> <span class="italic text-secondary dark:text-orange-500">诗歌.</span>
                </h1>
                <p id="proj-desc" class="font-body text-base md:text-xl text-on-surface-variant dark:text-gray-300 max-w-lg leading-relaxed transition-colors">
                    在这里记录技术探索、网页实验室以及偶尔的胡思乱想。一次对极简主义与前端工程化的视觉探索。
                </p>
                
                <div class="flex flex-row items-center gap-4 pt-2 md:pt-6">
                    <a id="proj-link-1" href="#" class="bg-secondary-container dark:bg-orange-700 text-white px-6 md:px-8 py-3 md:py-4 rounded-md font-label uppercase tracking-widest text-xs md:text-sm font-bold hover:brightness-110 transition-all active:scale-95 shadow-lg shadow-secondary/20 block text-center">
                        阅读文章
                    </a>
                    
                    <!-- 🌟 完美修复：下划线现在包裹了 [文字 + 间隔 + 箭头] 这个完整的整体区块 -->
                    <a id="proj-link-2" href="#" class="group relative py-2 md:py-4 text-primary dark:text-gray-200 font-bold font-label uppercase tracking-widest text-xs md:text-sm block">
                        <!-- 内容层 -->
                        <span class="flex items-center space-x-1 md:space-x-2 relative z-10">
                            <span>浏览作品</span>
                            <span class="material-symbols-outlined text-secondary dark:text-orange-400 transition-transform group-hover:translate-x-1 text-sm md:text-base">arrow_right_alt</span>
                        </span>
                        <!-- 下划线动画层 (相对于最外层的 a 标签定位，100% 覆盖) -->
                        <span class="absolute bottom-1 md:bottom-3 left-0 w-full h-[2px] bg-secondary dark:bg-orange-400 scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
                    </a>
                </div>
            </div>
        </div>

        <!-- 🌟 电脑端：霸气的侧边悬浮右箭头 (md:flex) -->
        <button onclick="changeProject(1)" class="hidden md:flex absolute right-8 z-40 w-14 h-14 items-center justify-center rounded-full bg-white dark:bg-slate-800 text-primary dark:text-white hover:bg-secondary hover:text-white dark:hover:bg-orange-600 transition-all duration-300 shadow-xl active:scale-95">
            <span class="material-symbols-outlined text-3xl">arrow_forward_ios</span>
        </button>
    </main>

    <!-- ========== 🌟 手机端专属控制台 (只在 md:hidden 时显示) ========== -->
    <div class="w-full flex md:hidden justify-center items-center pb-8 mt-auto z-30 gap-6">
        <!-- 手机端底部的左箭头 -->
        <button onclick="changeProject(-1)" class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-variant dark:bg-slate-800 text-primary dark:text-white active:scale-90 shadow-md">
            <span class="material-symbols-outlined text-2xl">chevron_left</span>
        </button>
        
        <!-- 手机端指示器容器 (将通过 JS 渲染) -->
        <div class="flex space-x-2 items-center" id="mobile-dots-container">
        </div>

        <!-- 手机端底部的右箭头 -->
        <button onclick="changeProject(1)" class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-variant dark:bg-slate-800 text-primary dark:text-white active:scale-90 shadow-md">
            <span class="material-symbols-outlined text-2xl">chevron_right</span>
        </button>
    </div>

    <!-- ========== 底部版权栏 ========== -->
    <footer class="w-full bg-blue-950 dark:bg-black text-white flex flex-col md:flex-row justify-center md:justify-between items-center px-12 py-6 transition-colors duration-500 z-30 relative">
        <div class="font-serif italic text-white text-sm hidden md:block">极客阿明.</div>
        <div class="font-sans text-xs uppercase tracking-widest text-white/60 text-center">
            © 2024 极客阿明. 用键盘敲击世界.
        </div>
        
        <!-- 🌟 电脑端专属指示器 (只在 md:flex 时显示，固定在底部栏右侧) -->
        <div class="hidden md:flex absolute right-12 top-1/2 -translate-y-1/2 space-x-3 items-center z-40" id="desktop-dots-container">
        </div>
    </footer>

    <!-- ================= JS 逻辑控制区 ================= -->
    <script>
        const htmlElement = document.documentElement;
        const themeIcon = document.getElementById('theme-icon');
        function toggleDarkMode() {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                themeIcon.innerText = 'dark_mode';
                themeIcon.classList.remove('text-yellow-400');
            } else {
                htmlElement.classList.add('dark');
                themeIcon.innerText = 'light_mode';
                themeIcon.classList.add('text-yellow-400');
            }
        }

        const mobileMenu = document.getElementById('mobile-menu');
        function toggleMobileMenu() {
            mobileMenu.classList.toggle('hidden');
            mobileMenu.classList.toggle('flex');
        }

        const projects = [
            { tag: "Vol. 001 创刊号", title: "代码与 <br/> <span class='italic text-secondary dark:text-orange-500'>诗歌.</span>", desc: "在这里记录技术探索、网页实验室以及偶尔的胡思乱想。一次对极简主义与前端工程化的视觉探索。", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=800&auto=format&fit=crop", num: "01" },
            { tag: "Vol. 002 实验室", title: "创意与 <br/> <span class='italic text-secondary dark:text-orange-500'>设计.</span>", desc: "收集全网最酷的UI交互灵感，将天马行空的设计草图，用原生代码一行行还原成真实的像素。", img: "https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=800&auto=format&fit=crop", num: "02" },
            { tag: "Vol. 003 游乐场", title: "像素与 <br/> <span class='italic text-secondary dark:text-orange-500'>童年.</span>", desc: "复刻经典的网页小游戏，用 Vanilla JS 找回红白机时代的纯粹快乐。方向键准备就绪，按 Start 键开始。", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800&auto=format&fit=crop", num: "03" },
            { tag: "Vol. 004 随笔集", title: "深夜与 <br/> <span class='italic text-secondary dark:text-orange-500'>咖啡.</span>", desc: "剥离技术的坚硬外壳，记录生活碎片的柔软内核。一些关于读书、旅行和自我成长的杂谈。", img: "https://images.unsplash.com/photo-1495474472207-464a8d4ce17b?q=80&w=800&auto=format&fit=crop", num: "04" }
        ];

        let currentIndex = 0;
        const textContainer = document.getElementById('text-container');
        const imgContainer = document.getElementById('img-container');
        const progressBar = document.getElementById('progress-bar');
        const scrollImage = document.getElementById('scroll-image');
        const innerImg = document.getElementById('proj-img');
        
        // 分别获取手机端和电脑端的指示器容器
        const mobileDotsContainer = document.getElementById('mobile-dots-container');
        const desktopDotsContainer = document.getElementById('desktop-dots-container');

        function renderDots(container) {
            container.innerHTML = '';
            projects.forEach((_, index) => {
                const dot = document.createElement('div');
                // 🌟 最新设计：菱形科技点钻石切割！
                // 使用了 css 里自定义的 diamond-dot class (clip-path 截取的锐利图形)
                const isActive = index === currentIndex;
                const activeClass = isActive 
                    ? 'w-8 bg-secondary dark:bg-orange-500 opacity-100' 
                    : 'w-3 bg-outline-variant dark:bg-slate-500 hover:bg-secondary-fixed opacity-70';
                
                dot.className = `h-3 diamond-dot cursor-pointer transition-all duration-500 ${activeClass}`;
                dot.onclick = () => jumpToProject(index);
                container.appendChild(dot);
            });
        }

        function initDots() {
            renderDots(mobileDotsContainer);
            renderDots(desktopDotsContainer);
        }

        function updateUI() {
            textContainer.classList.add('fade-out');
            imgContainer.classList.add('fade-out');

            setTimeout(() => {
                const p = projects[currentIndex];
                document.getElementById('proj-tag').innerHTML = p.tag;
                document.getElementById('proj-title').innerHTML = p.title;
                document.getElementById('proj-desc').innerHTML = p.desc;
                innerImg.src = p.img;
                document.getElementById('proj-num').innerText = p.num;

                progressBar.style.width = `${((currentIndex + 1) / projects.length) * 100}%`;

                // 更新两端指示器状态
                renderDots(mobileDotsContainer);
                renderDots(desktopDotsContainer);

                textContainer.classList.remove('fade-out');
                imgContainer.classList.remove('fade-out');
            }, 400);
        }

        function changeProject(direction) {
            currentIndex = (currentIndex + direction + projects.length) % projects.length;
            updateUI();
        }

        function jumpToProject(index) {
            if (currentIndex === index) return;
            currentIndex = index;
            updateUI();
        }

        window.addEventListener('scroll', () => {
            if (window.innerWidth < 768) {
                const scrollY = window.scrollY;
                let progress = Math.min(scrollY / 300, 1);
                
                const rotY = progress * 15; 
                const rotZ = progress * -3; 
                const scale = 1 - (progress * 0.05); 
                const blur = progress * 3;
                const grayscale = progress * 100;

                scrollImage.style.transform = `rotateY(${rotY}deg) rotateZ(${rotZ}deg) scale(${scale})`;
                innerImg.style.filter = `blur(${blur}px) grayscale(${grayscale}%)`;
            } else {
                scrollImage.style.transform = '';
                innerImg.style.filter = '';
            }
        });

        window.onload = () => {
            initDots();
            progressBar.style.width = '25%';
        };
    </script>
</body>
</html>
